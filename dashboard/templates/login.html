{% load static %}
<!DOCTYPE html>
<html lang="{{ lang }}" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t.login }} — {{ t.app_name }}</title>
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
</head>
<body>
<div class="auth-wrap">
    <div class="auth-card">
        <div class="brand">
            <h1><span class="mark"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></span> {{ t.app_name }}</h1>
        </div>
        <p class="auth-sub">{{ t.login_subtitle }}</p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-error">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="email">{{ t.email }}</label>
                <input type="email" id="email" name="email" class="form-control"
                       required autofocus placeholder="admin@exemple.cm">
            </div>
            <div class="form-group">
                <label for="password">{{ t.password }}</label>
                <input type="password" id="password" name="password" class="form-control"
                       required placeholder="••••••••••••">
            </div>
            <div class="checkbox-row">
                <input type="checkbox" id="remember" name="remember">
                <label for="remember" style="margin:0;">{{ t.remember_me }}</label>
            </div>
            <button type="submit" class="btn btn-primary">{{ t.sign_in }}</button>
        </form>

        <div class="lang-switch-auth">
            <a class="lang-link {% if lang == 'fr' %}active{% endif %}" href="?lang=fr">Français</a>
            &nbsp;·&nbsp;
            <a class="lang-link {% if lang == 'en' %}active{% endif %}" href="?lang=en">English</a>
        </div>
    </div>
</div>
</body>
</html>
